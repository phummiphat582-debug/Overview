```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATV Executive Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--primary:#ef4b3f;
--green:#16a34a;
--yellow:#f59e0b;
--red:#dc2626;
--bg:#f4f6f8;
--card:#ffffff;
--text:#1f2937;
--shadow:0 12px 30px rgba(0,0,0,.08);
--radius:18px;
}

body{
margin:0;
font-family:Tahoma;
background:var(--bg);
color:var(--text);
}

.app{
display:grid;
grid-template-columns:260px 1fr;
min-height:100vh;
}

.left{
background:#fff;
padding:20px;
box-shadow:var(--shadow);
}

.menu-btn{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:12px;
cursor:pointer;
background:#f3f4f6;
}

.menu-btn.active{
background:var(--primary);
color:#fff;
}

.main{
padding:25px;
}

.card{
background:var(--card);
border-radius:var(--radius);
padding:20px;
box-shadow:var(--shadow);
margin-bottom:20px;
}

.kpi-row{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.kpi{
padding:20px;
border-radius:15px;
background:#f9fafb;
border-left:8px solid transparent;
}

.kpi.good{border-color:var(--green);}
.kpi.warn{border-color:var(--yellow);}
.kpi.danger{border-color:var(--red);}

.value{
font-size:22px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
margin-top:5px;
}

button.primary{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:var(--primary);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:8px;
}

</style>
</head>

<body>

<div class="app">

<div class="left">

<h3>ATV Dashboard</h3>

<button class="menu-btn active" onclick="showPage('dashboard',this)">ภาพรวม</button>
<button class="menu-btn" onclick="showPage('detail',this)">บันทึกข้อมูล</button>

</div>

<div class="main">

<section id="dashboard">

<div class="card">
<h2>ภาพรวมกิจการ</h2>
</div>

<div class="card">
<label>เลือกเดือน</label>
<input type="month" id="dashMonth" onchange="renderDashboard()">
</div>

<div class="kpi-row">

<div class="kpi" id="kpiRev">
<div>รายได้รวม</div>
<div class="value" id="revTxt">-</div>
</div>

<div class="kpi" id="kpiProfit">
<div>กำไรสุทธิ</div>
<div class="value" id="profitTxt">-</div>
</div>

<div class="kpi">
<div>ลูกค้า Walkin / บ้าน</div>
<div class="value" id="custTxt">-</div>
</div>

<div class="kpi">
<div>พนักงาน (ทำงาน/หยุด/เตือน)</div>
<div class="value" id="staffTxt">-</div>
</div>

</div>

<div class="card">
<canvas id="mainChart"></canvas>
</div>

</section>

<section id="detail" style="display:none">

<div class="card">
<label>เลือกเดือน</label>
<input type="month" id="month">
</div>

<div class="card">
<h3>รายได้</h3>

<label>Tour</label>
<input id="revTour">

<label>Rent</label>
<input id="revRent">

<label>Other</label>
<input id="revOther">

</div>

<div class="card">
<h3>รายจ่าย</h3>

<label>Fuel</label>
<input id="expFuel">

<label>Repair</label>
<input id="expRepair">

<label>Salary</label>
<input id="expSalary">

<label>Other</label>
<input id="expOther">

</div>

<div class="card">
<h3>ลูกค้า</h3>

<label>Walkin</label>
<input id="walkin">

<label>Home</label>
<input id="home">

</div>

<div class="card">
<h3>Staff</h3>

<table id="staffTable">
<tr>
<th>ชื่อ</th>
<th>ทำงาน</th>
<th>หยุด</th>
<th>เตือน</th>
</tr>
</table>

<button class="primary" onclick="addStaff()">เพิ่มพนักงาน</button>

</div>

<div class="card">

<button class="primary" onclick="saveMonth()">บันทึกข้อมูล</button>

</div>

</section>

</div>

</div>

<script>

let chart

function showPage(id,btn){

document.querySelectorAll("section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"

document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

}

function addStaff(){

const row=document.createElement("tr")

row.innerHTML=`
<td><input></td>
<td><input type="number"></td>
<td><input type="number"></td>
<td><input type="number"></td>
`

staffTable.appendChild(row)

}

function saveMonth(){

if(!month.value){
alert("เลือกเดือนก่อน")
return
}

const staff=[...staffTable.querySelectorAll("tr")]
.slice(1)
.map(r=>{
const i=r.querySelectorAll("input")
return{
name:i[0].value,
work:+i[1].value,
off:+i[2].value,
warn:+i[3].value
}
})

const data={

revenue:{
tour:+revTour.value||0,
rent:+revRent.value||0,
other:+revOther.value||0
},

expenses:{
fuel:+expFuel.value||0,
repair:+expRepair.value||0,
salary:+expSalary.value||0,
other:+expOther.value||0
},

customers:{
walkin:+walkin.value||0,
home:+home.value||0
},

staff

}

localStorage.setItem("ATV_"+month.value,JSON.stringify(data))

alert("บันทึกสำเร็จ")

}

function renderDashboard(){

const m=dashMonth.value
if(!m)return

const d=JSON.parse(localStorage.getItem("ATV_"+m)||"{}")

const tour=d.revenue?.tour||0
const rent=d.revenue?.rent||0
const other=d.revenue?.other||0

const fuel=d.expenses?.fuel||0
const repair=d.expenses?.repair||0
const salary=d.expenses?.salary||0
const expOther=d.expenses?.other||0

const revenue=tour+rent+other
const expense=fuel+repair+salary+expOther
const profit=revenue-expense

revTxt.innerText=revenue.toLocaleString()+" บาท"
profitTxt.innerText=profit.toLocaleString()+" บาท"

custTxt.innerText=
(d.customers?.walkin||0)+" / "+
(d.customers?.home||0)

const st=d.staff||[]

staffTxt.innerText=
st.reduce((a,b)=>a+b.work,0)+" / "+
st.reduce((a,b)=>a+b.off,0)+" / "+
st.reduce((a,b)=>a+b.warn,0)

if(chart)chart.destroy()

chart=new Chart(document.getElementById("mainChart"),{

type:"bar",

data:{
labels:[
"Tour",
"Rent",
"Other",
"Fuel",
"Repair",
"Salary",
"Expense Other"
],

datasets:[{
label:"รายได้ / รายจ่าย",
data:[
tour,
rent,
other,
fuel,
repair,
salary,
expOther
],
backgroundColor:[
"#16a34a",
"#22c55e",
"#4ade80",
"#ef4444",
"#dc2626",
"#b91c1c",
"#991b1b"
]
}]

}

})

}

dashMonth.value=new Date().toISOString().slice(0,7)

renderDashboard()

</script>

</body>
</html>
```
