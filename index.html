```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แดชบอร์ดธุรกิจ ATV</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--primary:#ef4b3f;
--green:#16a34a;
--yellow:#f59e0b;
--red:#dc2626;
--bg:#f4f6f8;
--card:#ffffff;
--shadow:0 10px 30px rgba(0,0,0,.08);
}

body{
margin:0;
font-family:tahoma;
background:var(--bg);
}

.app{
display:grid;
grid-template-columns:260px 1fr;
min-height:100vh;
}

.sidebar{
background:#fff;
padding:20px;
box-shadow:var(--shadow);
}

.menu-btn{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#f3f4f6;
cursor:pointer;
}

.menu-btn.active{
background:var(--primary);
color:white;
}

.main{
padding:28px;
}

.card{
background:#fff;
border-radius:16px;
padding:24px;
margin-bottom:22px;
box-shadow:var(--shadow);
}

.kpi-row{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.kpi{
padding:18px;
background:#f9fafb;
border-radius:12px;
border-left:6px solid transparent;
}

.kpi.good{border-color:#16a34a}
.kpi.warn{border-color:#f59e0b}
.kpi.danger{border-color:#dc2626}

.value{
font-size:22px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
margin-top:5px;
}

button.primary{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#ef4b3f;
color:white;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<h3>แดชบอร์ด ATV</h3>

<button class="menu-btn active" onclick="showPage('dashboard',this)">
ภาพรวมธุรกิจ
</button>

<button class="menu-btn" onclick="showPage('detail',this)">
บันทึก / แก้ไขข้อมูล
</button>

</div>

<div class="main">

<section id="dashboard">

<div class="card">
<h2>ภาพรวมธุรกิจ ATV</h2>
</div>

<div class="card">

<label>เลือกเดือน</label>
<input type="month" id="dashMonth" onchange="renderDashboard()">

</div>

<div class="kpi-row">

<div class="kpi">
<div>รถพร้อมบริการมากสุด</div>
<div class="value" id="maxTxt">-</div>
</div>

<div class="kpi">
<div>รถพร้อมบริการน้อยสุด</div>
<div class="value" id="minTxt">-</div>
</div>

<div class="kpi">
<div>รายได้รวม</div>
<div class="value" id="revTxt">-</div>
</div>

<div class="kpi">
<div>รายจ่ายรวม</div>
<div class="value" id="expTxt">-</div>
</div>

<div class="kpi" id="kpiProfit">
<div>กำไรสุทธิ</div>
<div class="value" id="profitTxt">-</div>
</div>

<div class="kpi">
<div>รายได้เทียบเดือนก่อน</div>
<div class="value" id="revDiffTxt">-</div>
</div>

<div class="kpi">
<div>กำไรเทียบเดือนก่อน</div>
<div class="value" id="profitDiffTxt">-</div>
</div>

<div class="kpi">
<div>ลูกค้า (Walk-in / Villa / Agent)</div>
<div class="value" id="custTxt">-</div>
</div>

</div>

<div class="card">
<h3>สรุปรายได้ / รายจ่าย / กำไร</h3>
<canvas id="mainChart"></canvas>
</div>

</section>

<section id="detail" style="display:none">

<div class="card">

<label>เลือกเดือน</label>
<input type="month" id="month" onchange="loadMonth()">

</div>

<div class="card">

<h3>รถพร้อมบริการ</h3>

<label>มากสุด</label>
<input id="maxCar">

<label>น้อยสุด</label>
<input id="minCar">

</div>

<div class="card">

<h3>รายได้</h3>

<label>ทัวร์</label>
<input id="revTour">

<label>เช่า</label>
<input id="revRent">

<label>อื่นๆ</label>
<input id="revOther">

</div>

<div class="card">

<h3>รายจ่าย</h3>

<label>ค่าน้ำมัน</label>
<input id="expFuel">

<label>ค่าซ่อม</label>
<input id="expRepair">

<label>เงินเดือน</label>
<input id="expSalary">

<label>อื่นๆ</label>
<input id="expOther">

</div>

<div class="card">

<h3>ลูกค้า</h3>

<label>Walk-in</label>
<input id="walkin">

<label>Villa</label>
<input id="villa">

<label>Agent</label>
<input id="agent">

</div>

<div class="card">

<button class="primary" onclick="saveMonth()">
บันทึกข้อมูล
</button>

</div>

</section>

</div>
</div>

<script>

let chart

function showPage(id,btn){

document.querySelectorAll("section").forEach(s=>s.style.display="none")

document.getElementById(id).style.display="block"

document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"))

btn.classList.add("active")

if(id==="dashboard") renderDashboard()

}

function saveMonth(){

if(!month.value){
alert("กรุณาเลือกเดือน")
return
}

const data={

cars:{
max:+maxCar.value||0,
min:+minCar.value||0
},

revenue:{
tour:+revTour.value||0,
rent:+revRent.value||0,
other:+revOther.value||0
},

expenses:{
fuel:+expFuel.value||0,
repair:+expRepair.value||0,
salary:+expSalary.value||0,
other:+expOther.value||0
},

customers:{
walkin:+walkin.value||0,
villa:+villa.value||0,
agent:+agent.value||0
}

}

localStorage.setItem("ATV_"+month.value,JSON.stringify(data))

alert("บันทึกข้อมูลเรียบร้อย")

}

function loadMonth(){

const d=JSON.parse(localStorage.getItem("ATV_"+month.value) || "{}")

maxCar.value=d.cars?.max||""
minCar.value=d.cars?.min||""

revTour.value=d.revenue?.tour||""
revRent.value=d.revenue?.rent||""
revOther.value=d.revenue?.other||""

expFuel.value=d.expenses?.fuel||""
expRepair.value=d.expenses?.repair||""
expSalary.value=d.expenses?.salary||""
expOther.value=d.expenses?.other||""

walkin.value=d.customers?.walkin||""
villa.value=d.customers?.villa||""
agent.value=d.customers?.agent||""

}

function renderDashboard(){

const m=dashMonth.value
if(!m)return

const d=JSON.parse(localStorage.getItem("ATV_"+m) || "{}")

const prevDate=new Date(m+"-01")
prevDate.setMonth(prevDate.getMonth()-1)

const prevKey="ATV_"+prevDate.toISOString().slice(0,7)

const p=JSON.parse(localStorage.getItem(prevKey) || "{}")

const tour=d.revenue?.tour||0
const rent=d.revenue?.rent||0
const other=d.revenue?.other||0

const fuel=d.expenses?.fuel||0
const repair=d.expenses?.repair||0
const salary=d.expenses?.salary||0
const expOther=d.expenses?.other||0

const revenue=tour+rent+other
const expense=fuel+repair+salary+expOther
const profit=revenue-expense

const prevRevenue=
(p.revenue?.tour||0)+
(p.revenue?.rent||0)+
(p.revenue?.other||0)

const prevExpense=
(p.expenses?.fuel||0)+
(p.expenses?.repair||0)+
(p.expenses?.salary||0)+
(p.expenses?.other||0)

const prevProfit=prevRevenue-prevExpense

revTxt.innerText=revenue.toLocaleString()+" บาท"
expTxt.innerText=expense.toLocaleString()+" บาท"
profitTxt.innerText=profit.toLocaleString()+" บาท"

maxTxt.innerText=(d.cars?.max||0)+" คัน"
minTxt.innerText=(d.cars?.min||0)+" คัน"

custTxt.innerText=
(d.customers?.walkin||0)+" / "+
(d.customers?.villa||0)+" / "+
(d.customers?.agent||0)

let revDiff="-"
let profitDiff="-"

if(prevRevenue>0){
revDiff=((revenue-prevRevenue)/prevRevenue*100).toFixed(1)+"%"
}

if(prevProfit!=0){
profitDiff=((profit-prevProfit)/prevProfit*100).toFixed(1)+"%"
}

revDiffTxt.innerText=revDiff
profitDiffTxt.innerText=profitDiff

if(chart) chart.destroy()

chart=new Chart(document.getElementById("mainChart"),{

type:"bar",

data:{
labels:["รายได้","รายจ่าย","กำไร"],
datasets:[{
data:[revenue,expense,profit],
backgroundColor:["#16a34a","#ef4444","#6366f1"]
}]
},

options:{
plugins:{
legend:{display:false}
}
}

})

}

dashMonth.value=new Date().toISOString().slice(0,7)

renderDashboard()

</script>

</body>
</html>
```
